<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Miople的小窝</title>
  <meta name="description" content="mio 和 maple 的可爱小站点" />
  <style>
    :root {
      --bg-a: #fff6fb;
      --bg-b: #f4fbff;
      --pink: #ff9fcb;
      --peach: #ffc8a2;
      --lavender: #d9c6ff;
      --mint: #bff5df;
      --text: #5f4b69;
      --card: rgba(255, 255, 255, 0.8);
      --line: rgba(255, 159, 203, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, rgba(255, 159, 203, 0.2), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(217, 198, 255, 0.25), transparent 32%),
        radial-gradient(circle at 78% 80%, rgba(191, 245, 223, 0.25), transparent 30%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      overflow-x: hidden;
    }

    .decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bubble,
    .star,
    .heart {
      position: absolute;
      opacity: 0.7;
    }

    .bubble {
      width: 18px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.35);
      box-shadow: inset -4px -4px 8px rgba(255, 255, 255, 0.7);
    }

    .star {
      font-size: 16px;
      color: #ffb6dd;
    }

    .heart {
      color: #ff8fc4;
      font-size: 15px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: min(900px, 92vw);
      margin: 0 auto;
      padding: 56px 0 40px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(3px);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 26px 24px;
      box-shadow: 0 12px 28px rgba(255, 159, 203, 0.13);
      margin-bottom: 18px;
    }

    h1, h2 {
      margin: 0 0 12px;
      line-height: 1.25;
    }

    h1 {
      font-size: clamp(30px, 5vw, 44px);
      color: #ff79b8;
      letter-spacing: 1px;
    }

    h2 {
      font-size: clamp(22px, 3vw, 28px);
      color: #9e7fdd;
    }

    p {
      margin: 0;
      line-height: 1.9;
      font-size: 16px;
    }

    .badge {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 159, 203, 0.2), rgba(191, 245, 223, 0.35));
      border: 1px solid rgba(255, 159, 203, 0.3);
      font-size: 14px;
    }

    .names {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .name-pill {
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 14px;
      background: white;
      border: 1px solid var(--line);
    }

    footer {
      text-align: center;
      font-size: 14px;
      color: #8f7c98;
    }

    .small {
      display: block;
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="decor" aria-hidden="true">
    <span class="bubble" style="top: 10%; left: 8%;"></span>
    <span class="bubble" style="top: 20%; left: 80%; width: 24px;"></span>
    <span class="bubble" style="top: 66%; left: 12%; width: 16px;"></span>
    <span class="bubble" style="top: 75%; left: 86%; width: 20px;"></span>
    <span class="star" style="top: 14%; left: 52%;">✦</span>
    <span class="star" style="top: 38%; left: 88%;">✧</span>
    <span class="star" style="top: 74%; left: 40%;">✦</span>
    <span class="heart" style="top: 24%; left: 20%;">❤</span>
    <span class="heart" style="top: 56%; left: 76%;">❤</span>
    <span class="heart" style="top: 82%; left: 30%;">❤</span>
  </div>

  <main class="container">
    <section class="card">
      <h1>Miople的小窝</h1>
      <p>
        欢迎来到我们的小天地！这里是 <strong>mio</strong> 和 <strong>maple</strong> 的温柔角落，
        记录灵感、快乐和日常里闪闪发光的小事情。
      </p>
      <span class="badge">｡･:*:･ﾟ★ 和你分享可爱日常 ★ﾟ･:*:･｡</span>
    </section>

    <section class="card">
      <h2>关于我们</h2>
      <p>
        我们喜欢把平凡的日子过成软绵绵的云朵：一起聊天、一起做有趣的小项目、
        一起收藏让人心动的颜色和故事。希望这个网站也能把这份温暖传递给你。
      </p>
      <div class="names">
        <span class="name-pill">mio ♡ 喜欢可爱和创作</span>
        <span class="name-pill">maple ♡ 温柔又有趣的搭档</span>
      </div>
    </section>

    <section class="card">
      <footer>
        感谢你路过 Miople 的小窝，愿你今天也被温柔对待 ✿
        <span class="small">Made with love by mio &amp; maple</span>
      </footer>
    </section>
  </main>
</body>
</html>
